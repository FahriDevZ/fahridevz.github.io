<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enjoy the silence.</title>
    <meta name="description" content="Enjoy the silence. Fahri. Pronounced FAH-ree." />
    <meta name="p:domain_verify" content="874b56aa98eb4025b576a65db793f7b0" />
    <style>
      :root {
        --bg: #08070b;
        --bg-deep: #0e0b12;
        --text: #f5edf6;
        --muted: #b8acbc;
        --accent: #f092aa;
        --accent-soft: rgba(240, 146, 170, 0.16);
        --line: rgba(255, 255, 255, 0.08);
        --panel: rgba(255, 255, 255, 0.035);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: var(--text);
        font-family: "Segoe UI", "Aptos", sans-serif;
        background:
          radial-gradient(circle at 18% 16%, rgba(240, 146, 170, 0.06), transparent 22%),
          radial-gradient(circle at 82% 74%, rgba(167, 128, 255, 0.05), transparent 24%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      }

      .scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .scene::before {
        content: "";
        position: absolute;
        inset: -20%;
        background:
          radial-gradient(circle at 20% 20%, rgba(240, 146, 170, 0.08), transparent 24%),
          radial-gradient(circle at 80% 72%, rgba(167, 128, 255, 0.06), transparent 26%),
          radial-gradient(circle at 58% 28%, rgba(255, 220, 229, 0.035), transparent 18%);
        filter: blur(18px);
        opacity: 0.7;
        animation: auroraShift 28s ease-in-out infinite alternate;
      }

      .interactive-field {
        position: absolute;
        inset: -12%;
        background:
          radial-gradient(circle at 18% 18%, rgba(240, 146, 170, 0.08), transparent 18%),
          radial-gradient(circle at 78% 72%, rgba(167, 128, 255, 0.06), transparent 20%),
          radial-gradient(circle at 68% 22%, rgba(255, 255, 255, 0.018), transparent 16%),
          repeating-linear-gradient(
            120deg,
            rgba(255, 255, 255, 0.02) 0,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px,
            transparent 56px
          );
        opacity: 0.84;
        animation: fieldShift 18s ease-in-out infinite alternate, tintShift 26s ease-in-out infinite;
      }

      .glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(18px);
        opacity: 0.45;
        animation: drift 16s ease-in-out infinite, tintShift 24s ease-in-out infinite;
      }

      .glow.one {
        top: 8%;
        left: 4%;
        width: 340px;
        height: 340px;
        background: radial-gradient(circle, rgba(240, 146, 170, 0.16), transparent 70%);
      }

      .glow.two {
        right: 6%;
        bottom: 8%;
        width: 420px;
        height: 420px;
        background: radial-gradient(circle, rgba(164, 122, 255, 0.09), transparent 72%);
        animation-duration: 19s;
        animation-direction: reverse;
      }

      .glow.three {
        top: 28%;
        right: 18%;
        width: 220px;
        height: 220px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.05), transparent 74%);
        animation-duration: 14s;
        animation-delay: -6s;
      }

      .rings {
        position: absolute;
        inset: 50% auto auto 50%;
        width: 72vmax;
        height: 72vmax;
        transform: translate(-50%, -50%);
      }

      .ring {
        position: absolute;
        inset: 0;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        animation: pulse 10s linear infinite;
      }

      .ring:nth-child(2) {
        inset: 9%;
        animation-duration: 12s;
        animation-direction: reverse;
      }

      .ring:nth-child(3) {
        inset: 18%;
        animation-duration: 14s;
      }

      .stars {
        position: absolute;
        inset: 0;
      }

      .star {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.35);
        animation: twinkle 4.4s ease-in-out infinite;
      }

      .star:nth-child(1) {
        top: 18%;
        left: 24%;
        animation-delay: 0.2s;
      }

      .star:nth-child(2) {
        top: 26%;
        right: 22%;
        animation-delay: 1.3s;
      }

      .star:nth-child(3) {
        top: 62%;
        left: 18%;
        animation-delay: 2.1s;
      }

      .star:nth-child(4) {
        bottom: 22%;
        right: 18%;
        animation-delay: 0.8s;
      }

      .star:nth-child(5) {
        top: 48%;
        right: 32%;
        animation-delay: 2.8s;
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card-shell {
        position: relative;
        width: min(760px, 100%);
      }

      .card-shell::before,
      .card-shell::after {
        content: "";
        position: absolute;
        inset: -12%;
        z-index: 0;
        border-radius: 44px;
        pointer-events: none;
        filter: blur(30px);
      }

      .card-shell::before {
        background:
          radial-gradient(circle at 20% 18%, rgba(240, 146, 170, 0.16), transparent 24%),
          radial-gradient(circle at 84% 82%, rgba(167, 128, 255, 0.1), transparent 28%);
        opacity: 0.68;
      }

      .card-shell::after {
        inset: -6%;
        background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08), transparent 58%);
        filter: blur(52px);
        opacity: 0.3;
      }

      .card {
        position: relative;
        z-index: 1;
        overflow: hidden;
        padding: clamp(28px, 5vw, 52px);
        border: 1px solid var(--line);
        border-radius: 32px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.025)),
          var(--panel);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(14px);
        text-align: center;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.022), transparent 24%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 36%);
        opacity: 0.62;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.8rem, 7vw, 4.8rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .copy {
        max-width: 34rem;
        margin: 28px auto 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.95;
      }

      .socials {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 6px;
        margin-top: 28px;
        width: fit-content;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
        padding: 6px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
      }

      .social {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        position: relative;
        overflow: hidden;
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid transparent;
        border-radius: 12px;
        background: transparent;
        color: inherit;
        text-decoration: none;
        transition: transform 180ms ease, border-color 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      }

      .social::before {
        content: "";
        position: absolute;
        inset: 0;
        padding: 1px;
        border-radius: inherit;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.16) 22%,
          rgba(240, 146, 170, 0.34) 50%,
          rgba(255, 255, 255, 0.14) 78%,
          rgba(255, 255, 255, 0) 100%
        );
        background-size: 200% 100%;
        background-position: 0% 50%;
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 180ms ease, background-position 520ms ease;
      }

      .social:hover,
      .social:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.035);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
      }

      .social:hover::before,
      .social:focus-visible::before {
        opacity: 1;
        background-position: 100% 50%;
      }

      .social-icon {
        display: grid;
        place-items: center;
        width: 14px;
        height: 14px;
        flex: 0 0 14px;
        color: rgba(245, 237, 246, 0.72);
      }

      .social-icon svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }

      .social small {
        display: block;
        margin: 0;
        color: rgba(245, 237, 246, 0.78);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        line-height: 1;
        text-align: center;
        text-transform: uppercase;
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        50% {
          transform: translate3d(18px, -24px, 0) scale(1.08);
        }
      }

      @keyframes pulse {
        0% {
          transform: rotate(0deg) scale(1);
          opacity: 0.28;
        }
        50% {
          transform: rotate(180deg) scale(1.035);
          opacity: 0.14;
        }
        100% {
          transform: rotate(360deg) scale(1);
          opacity: 0.28;
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.28;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.9);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.82;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes fieldShift {
        0% {
          transform: translate3d(-10px, -6px, 0) scale(1);
        }
        100% {
          transform: translate3d(12px, 8px, 0) scale(1.03);
        }
      }

      @keyframes auroraShift {
        0% {
          transform: translate3d(-14px, -8px, 0) scale(1);
          opacity: 0.58;
        }
        50% {
          transform: translate3d(8px, 10px, 0) scale(1.04);
          opacity: 0.74;
        }
        100% {
          transform: translate3d(16px, -10px, 0) scale(1.02);
          opacity: 0.62;
        }
      }

      @keyframes tintShift {
        0%,
        100% {
          filter: blur(18px) hue-rotate(0deg) saturate(100%);
        }
        50% {
          filter: blur(20px) hue-rotate(14deg) saturate(112%);
        }
      }

      @media (max-width: 720px) {
        body {
          overflow-y: auto;
        }

        main {
          padding: 18px;
        }

        .card {
          border-radius: 24px;
        }

        .socials {
          gap: 4px;
          padding: 5px;
          border-radius: 16px;
        }

        .social {
          align-items: center;
          flex-direction: row;
          min-height: 32px;
          padding: 0 9px;
        }

        .card-shell::before {
          inset: -8%;
        }

        .glow.one {
          width: 260px;
          height: 260px;
        }

        .glow.two {
          width: 300px;
          height: 300px;
        }

        .glow.three {
          width: 160px;
          height: 160px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
        }

        .interactive-field,
        .rings,
        .card-shell::before,
        .scene::before {
          transform: none !important;
        }
      }
    </style>
  </head>
